# ── 8. DESIGN DECISIONS & TRADE-OFFS ─────────────────────────────────────────

design_decisions:

  no_ml_models_at_runtime:
    decision: Pure rule-based scoring; no sklearn TF-IDF, no embedding models loaded
    rationale: >
      Satisfies the strict CPU-only / no-network / under-5-minute constraints.
      sklearn TF-IDF vectorising 100k documents would add ~45–90 seconds and
      require corpus fitting before scoring, violating the streaming requirement.

  streaming_architecture:
    decision: Process one JSONL line at a time via open() iterator
    rationale: >
      O(1) memory footprint regardless of dataset size. The only in-memory
      structure is the top-N candidates list (max 100 dicts after sorting).

  grace_period_12_months:
    decision: Skill duration grace period set to 12 months (relaxed from initial 6)
    rationale: >
      A 6-month grace dropped ~15k candidates including legitimate profiles
      where skills were acquired through bootcamps, freelance work, or education
      that overlaps with or predates formal employment. 12 months reduces
      false-positive drops from 15,090 to 10,925 while still catching
      obviously fabricated timelines (e.g., skill claimed for 88 months on
      a 6-year career).

  interview_completion_rate_as_multiplier:
    decision: Apply ICR as a final score multiplier, not an additive component
    rationale: >
      A multiplicative signal captures the behavioural quality of a candidate
      holistically. A technically excellent candidate who never completes
      interviews is a bad hire regardless of skill score.

  title_multiplier_not_filter:
    decision: Job title affects score via multiplier; it does not hard-filter
    rationale: >
      Career-switchers and non-standard title holders (e.g., "Applied Scientist",
      "Search Engineer") may be excellent AI Engineers. Hard-filtering on title
      would introduce bias and reduce pool quality.


# ── 9. OUTPUT FORMAT ─────────────────────────────────────────────────────────

output:
  file:    team_submission.csv
  rows:    100
  columns:
    candidate_id:
      type:        string
      description: Unique identifier from the source dataset (e.g. CAND_0055992)
    rank:
      type:        integer
      range:       1–100
      description: Descending rank by final_score; rank 1 = best match
    score:
      type:        float
      precision:   4 decimal places
      range:       "53.0158 – 96.3092  (observed in this run)"
      description: Composite weighted score after all three gates and multipliers
    reasoning:
      type:        string
      format:      "{title} with {yoe} yrs exp; top skills: {s1}, {s2}, {s3}; interview rate: {icr}%; recruiter response: {rr}%."
      description: Human-readable one-sentence justification for the ranking
