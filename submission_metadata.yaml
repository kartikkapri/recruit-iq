# ── 6. METHODOLOGY — 3-GATE PIPELINE ─────────────────────────────────────────

methodology:
  architecture: 3-Gate CPU-Optimized Streaming Pipeline

  gate_1:
    name:        Honeypot & Keyword-Stuffer Filter (Trap Door)
    type:        Hard Drop — candidate is eliminated, not scored
    rules:
      skill_duration_check:
        description: >
          Each skill's duration_months must not exceed
          (years_of_experience × 12) + GRACE_PERIOD.
          A skill timeline that is physically impossible signals profile inflation.
        grace_period_months: 12          # relaxed from initial 6 to reduce false-positives
        example_drop: >
          Candidate with yoe=1.1 (13 months) listing a skill with duration=34 months
          exceeds 13+12=25 month limit → dropped as honeypot.
      keyword_stuffer_check:
        description: >
          A candidate whose current_title contains Sales, HR, Marketing, or Content
          AND whose skills list contains 3 or more entries from the AI skills set
          is classified as a keyword stuffer and dropped.
        non_tech_title_keywords: [sales, hr, marketing, content]
        ai_skills_threshold:     3
        ai_skills_set:
          - rag
          - pinecone
          - pytorch
          - faiss
          - langchain
          - embeddings
          - vector search
          - llm
          - fine-tuning llms
          - hugging face transformers
          - sentence transformers
          - mlops
          - kubeflow
          - mlflow
          - recommendation systems
          - nlp
          - information retrieval

  gate_2:
    name:        Behavioral Ghost Filter
    type:        Hard Drop — candidate is eliminated, not scored
    rules:
      recruiter_response_rate:
        threshold:   0.20
        condition:   drop if recruiter_response_rate < 0.20
      inactivity_check:
        condition: >
          Drop if last_active_date is more than 6 months before the cutoff date
          AND open_to_work_flag is False. Candidates inactive but actively seeking
          are retained.
        cutoff_date: "2026-06-01"
        inactivity_window_months: 6

  gate_3:
    name:        Rule-Based Weighted Scorer
    type:        Score + Rank — produces final numeric score per candidate
    scoring_components:
      skill_score:
        method: >
          Per-skill weighted sum. Each matching skill earns
          SKILL_WEIGHT × PROFICIENCY_MULTIPLIER + endorsement_bonus.
          Capped endorsement bonus: (min(endorsements, 50) / 50) × 0.5.
          Verified Redrob assessment scores add up to 3.0 bonus points.
        proficiency_multipliers:
          expert:       1.4
          advanced:     1.2
          intermediate: 1.0
          beginner:     0.7
        top_weighted_skills:
          rag:                    5.0
          llm:                    4.5
          fine-tuning llms:       4.5
          embeddings:             4.5
          hugging face transformers: 4.5
          vector search:          4.0
          faiss:                  4.0
          pinecone:               4.0
          langchain:              4.0
          peft:                   4.0
          information retrieval:  4.0
          pytorch:                4.0
          sentence transformers:  4.0

      experience_score:
        sweet_spot_years: "5–12"
        formula: >
          yoe >= 5 → min(yoe, 12) × 1.0  (max 12 pts).
          yoe <  5 → yoe × 0.5           (penalised).

      title_multiplier:
        application: multiplied against the full base score (not additive)
        values:
          ml engineer:                     1.30
          machine learning engineer:       1.30
          ai engineer:                     1.30
          nlp engineer:                    1.25
          applied ml engineer:             1.25
          recommendation systems engineer: 1.25
          search engineer:                 1.20
          research engineer:               1.20
          data scientist:                  1.15
          data engineer:                   1.15
          backend engineer:                1.10
          software engineer:               1.05
          full stack developer:            1.05
          default (no match):              1.00

      education_score:
        tier_bonuses:
          tier_1: 3.0    # IIT, IISc equivalents
          tier_2: 1.5
          tier_3: 0.5
          tier_4: 0.0
        ai_field_bonus: 1.5   # awarded when field_of_study matches AI/ML/CS/DS/IT
        cap:            6.0

      certification_bonus:
        points_each: 0.5
        cap:         2.0

      behavioral_signals:
        github_activity:       "max(score, 0) / 100 × 3.0  →  max 3.0 pts"
        profile_completeness:  "score / 100 × 2.0           →  max 2.0 pts"
        recruiter_response:    "rate × 2.0                  →  max ~2.0 pts"

      behavioral_multiplier:
        signal:  interview_completion_rate
        formula: final_score = base_score × max(interview_completion_rate, 0.10)
        rationale: >
          Candidates who complete interviews are prioritised. The 0.10 floor
          prevents high-scoring candidates with missing ICR data from scoring zero.


